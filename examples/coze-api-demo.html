<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法课桌学习助手 - Coze API 集成示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .config {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .config h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #333;
        }

        .config-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .config-input label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .config-input input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .config-input input:focus {
            outline: none;
            border-color: #667eea;
        }

        .config-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .chat-container {
            padding: 20px;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin: 0 10px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            resize: none;
            height: 50px;
            font-family: inherit;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 0 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            padding: 10px 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🪄 魔法课桌学习助手</h1>
            <p>Coze API 集成示例</p>
        </div>

        <div class="config">
            <h3>⚙️ API 配置</h3>
            <div class="config-input">
                <div>
                    <label for="apiKey">Coze API Key</label>
                    <input
                        type="text"
                        id="apiKey"
                        placeholder="pat_xxxxxxxxxxxxxxxx"
                    >
                </div>
                <div>
                    <label for="botId">Bot ID</label>
                    <input
                        type="text"
                        id="botId"
                        placeholder="7381xxxx"
                    >
                </div>
            </div>
            <div class="config-buttons">
                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                <button class="btn btn-secondary" onclick="loadConfig()">📂 加载配置</button>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-avatar">🪄</div>
                    <div class="message-bubble">
                        你好呀，小巫师！我是魔法课桌学习助手，需要什么帮助呢？✨
                    </div>
                </div>
            </div>
            <div class="input-area">
                <textarea
                    id="messageInput"
                    placeholder="输入你的问题..."
                    onkeypress="handleKeyPress(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    发送
                </button>
            </div>
        </div>

        <div class="status" id="status">
            就绪 - Session ID: <span id="sessionId">session_xxx</span>
        </div>
    </div>

    <script>
        // 生成随机 Session ID
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        // 初始化
        const sessionId = generateSessionId();
        document.getElementById('sessionId').textContent = sessionId;

        let apiKey = '';
        let botId = '';
        let isProcessing = false;

        // 保存配置
        function saveConfig() {
            apiKey = document.getElementById('apiKey').value.trim();
            botId = document.getElementById('botId').value.trim();

            if (!apiKey || !botId) {
                alert('请填写完整的 API Key 和 Bot ID');
                return;
            }

            localStorage.setItem('coze_api_key', apiKey);
            localStorage.setItem('coze_bot_id', botId);
            alert('配置已保存！');
            updateStatus('配置已保存，可以开始对话了');
        }

        // 加载配置
        function loadConfig() {
            apiKey = localStorage.getItem('coze_api_key') || '';
            botId = localStorage.getItem('coze_bot_id') || '';

            document.getElementById('apiKey').value = apiKey;
            document.getElementById('botId').value = botId;

            if (apiKey && botId) {
                updateStatus('配置已加载，可以开始对话了');
            } else {
                updateStatus('请先配置 API Key 和 Bot ID');
            }
        }

        // 更新状态
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 添加消息到界面
        function addMessage(role, content) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '🧙‍♂️' : '🪄';
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-bubble">${escapeHtml(content)}</div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 添加流式消息
        function addStreamMessage() {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'streamMessage';

            messageDiv.innerHTML = `
                <div class="message-avatar">🪄</div>
                <div class="message-bubble"><span class="loading"></span></div>
            `;

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            return messageDiv;
        }

        // 更新流式消息内容
        function updateStreamMessage(content) {
            const messageDiv = document.getElementById('streamMessage');
            if (messageDiv) {
                const bubble = messageDiv.querySelector('.message-bubble');
                bubble.textContent = content;
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送消息
        async function sendMessage() {
            if (isProcessing) {
                alert('正在处理中，请稍候...');
                return;
            }

            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();

            if (!message) {
                return;
            }

            if (!apiKey || !botId) {
                alert('请先配置 API Key 和 Bot ID');
                return;
            }

            // 清空输入框
            messageInput.value = '';

            // 添加用户消息
            addMessage('user', message);

            // 显示加载状态
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;

            // 创建流式消息占位
            const streamMessageDiv = addStreamMessage();
            let fullResponse = '';

            try {
                const response = await fetch('https://api.coze.com/open_api/v2/stream_run', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                        'Accept': 'text/event-stream'
                    },
                    body: JSON.stringify({
                        bot_id: botId,
                        user_id: sessionId,
                        additional_messages: [{
                            role: 'user',
                            content: message,
                            content_type: 'text'
                        }],
                        stream: true,
                        auto_save_history: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留最后一个不完整的行

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.content) {
                                    fullResponse += data.content;
                                    updateStreamMessage(fullResponse);
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

                updateStatus('对话完成');
            } catch (error) {
                console.error('Error:', error);
                updateStreamMessage('抱歉，出现错误：' + error.message);
                updateStatus('错误：' + error.message);
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 页面加载时尝试加载配置
        window.onload = function() {
            loadConfig();
        };
    </script>
</body>
</html>
