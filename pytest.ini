[pytest]
# pytest 配置文件

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 最小 Python 版本
minversion = 7.0

# 命令行选项
addopts =
    # 显示详细的测试输出
    -v
    # 显示本地变量（在失败时）
    -l
    # 显示简短的测试摘要
    -ra
    # 使用严格的模式
    --strict-markers

# 标记定义
markers =
    unit: 单元测试（快速，不依赖外部服务）
    integration: 集成测试（需要数据库、API等外部服务）
    slow: 慢速测试（耗时较长）
    smoke: 冒烟测试（核心功能测试）
    tool: 工具函数测试
    agent: Agent 测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
[coverage:run]
source = src
omit =
    tests/*
    src/agents/*
    src/storage/memory/*
    src/utils/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

precision = 2
show_missing = True
skip_covered = False
