<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法课桌学习助手 - 测试沙箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-header .status {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 8px;
        }

        .status.connected {
            background: rgba(76, 175, 80, 0.3);
        }

        .status.disconnected {
            background: rgba(244, 67, 54, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-container button:active {
            transform: translateY(0);
        }

        .input-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .welcome-message p {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .quick-action {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .quick-action:hover {
            background: #667eea;
            color: white;
        }

        .clear-chat {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .clear-chat:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Response formatting */
        .message-content pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🪄 魔法课桌学习助手</h1>
            <p>你好呀，小巫师！有什么魔法问题需要帮助吗？✨</p>
            <span class="status connected">● 已连接到服务器</span>
            <button class="clear-chat" onclick="clearChat()">清空对话</button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                <h2>欢迎来到魔法课桌！</h2>
                <p>我是你的专属魔法学习助手，可以帮助你：</p>
                <p>• 管理课程表和作业<br>
                • 记录运动和成就<br>
                • 解答学习问题<br>
                • 提供学习建议</p>
                <div class="quick-actions">
                    <button class="quick-action" onclick="sendQuickMessage('你好，请介绍一下你自己')">👋 介绍一下你自己</button>
                    <button class="quick-action" onclick="sendQuickMessage('我今天有哪些作业需要完成？')">📝 查看作业</button>
                    <button class="quick-action" onclick="sendQuickMessage('帮我制定一个学习计划')">📅 制定学习计划</button>
                    <button class="quick-action" onclick="sendQuickMessage('我需要什么学习建议？')">💡 学习建议</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="输入你的问题..." 
                onkeypress="handleKeyPress(event)"
            >
            <button id="sendButton" onclick="sendMessage()">发送 ✨</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/run';
        let threadId = 'test-' + Date.now();
        let conversationHistory = [];
        let isFirstMessage = true;

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // 清空欢迎消息
            if (isFirstMessage) {
                const welcomeMessage = document.querySelector('.welcome-message');
                if (welcomeMessage) {
                    welcomeMessage.remove();
                }
                isFirstMessage = false;
            }

            // 添加用户消息到界面
            addMessage(message, 'user');

            // 清空输入框
            input.value = '';
            input.disabled = true;
            document.getElementById('sendButton').disabled = true;

            // 显示加载指示器
            showLoading();

            try {
                // 构建对话历史
                const messages = conversationHistory.map(msg => ({
                    role: msg.role,
                    content: msg.content
                }));

                // 添加当前消息
                messages.push({
                    role: 'user',
                    content: message
                });

                // 发送请求到 API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        input: {
                            messages: messages
                        },
                        config: {
                            configurable: {
                                thread_id: threadId
                            }
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 隐藏加载指示器
                hideLoading();

                // 提取助手的回复
                let assistantMessage = '';
                if (data.messages && data.messages.length > 0) {
                    // 获取最后一条 AI 消息
                    const aiMessages = data.messages.filter(msg => msg.type === 'ai');
                    if (aiMessages.length > 0) {
                        assistantMessage = aiMessages[aiMessages.length - 1].content;
                    }
                }

                if (assistantMessage) {
                    addMessage(assistantMessage, 'assistant');

                    // 保存到对话历史
                    conversationHistory.push({
                        role: 'user',
                        content: message
                    });
                    conversationHistory.push({
                        role: 'assistant',
                        content: assistantMessage
                    });
                } else {
                    addMessage('抱歉，我无法理解你的问题，请再试一次。', 'assistant');
                }

            } catch (error) {
                hideLoading();
                console.error('Error:', error);
                addMessage('❌ 连接失败，请检查服务器是否正常运行。', 'assistant');
            }

            // 重新启用输入框
            input.disabled = false;
            input.focus();
            document.getElementById('sendButton').disabled = false;
        }

        function addMessage(content, type) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            // 简单的 Markdown 格式化
            let formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');

            messageDiv.innerHTML = `
                <div class="message-content">${formattedContent}</div>
                <div class="message-time">${timeStr}</div>
            `;

            container.appendChild(messageDiv);

            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        function showLoading() {
            const container = document.getElementById('messagesContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = `
                <div class="message-content">
                    <div class="loading-indicator">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideLoading() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            if (loadingIndicator) {
                loadingIndicator.remove();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function clearChat() {
            if (confirm('确定要清空所有对话吗？')) {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = `
                    <div class="welcome-message">
                        <h2>欢迎来到魔法课桌！</h2>
                        <p>我是你的专属魔法学习助手，可以帮助你：</p>
                        <p>• 管理课程表和作业<br>
                        • 记录运动和成就<br>
                        • 解答学习问题<br>
                        • 提供学习建议</p>
                        <div class="quick-actions">
                            <button class="quick-action" onclick="sendQuickMessage('你好，请介绍一下你自己')">👋 介绍一下你自己</button>
                            <button class="quick-action" onclick="sendQuickMessage('我今天有哪些作业需要完成？')">📝 查看作业</button>
                            <button class="quick-action" onclick="sendQuickMessage('帮我制定一个学习计划')">📅 制定学习计划</button>
                            <button class="quick-action" onclick="sendQuickMessage('我需要什么学习建议？')">💡 学习建议</button>
                        </div>
                    </div>
                `;
                conversationHistory = [];
                threadId = 'test-' + Date.now();
                isFirstMessage = true;
            }
        }

        // 自动聚焦到输入框
        window.onload = function() {
            document.getElementById('messageInput').focus();
        };
    </script>
</body>
</html>
