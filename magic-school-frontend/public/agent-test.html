<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent服务连接测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .test-section h3 {
            margin-top: 0;
            color: #333;
        }
        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .test-result.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .test-result.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .test-result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }
        .test-result.warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .config-input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .config-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
            margin-bottom: 20px;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Agent 服务连接测试工具</h1>

        <div class="config-section">
            <h3>⚙️ 配置</h3>
            <label>Agent服务地址：</label>
            <input type="text" id="agentUrl" class="config-input" value="http://101.126.128.57:5000" placeholder="http://localhost:5000">
            <br>
            <label>API后端地址：</label>
            <input type="text" id="apiUrl" class="config-input" value="http://101.126.128.57:3000" placeholder="http://localhost:3000">
        </div>

        <div class="test-section">
            <h3>1️⃣ 测试 Agent 服务健康检查</h3>
            <button onclick="testAgentHealth()">测试连接</button>
            <div id="agentHealthResult"></div>
        </div>

        <div class="test-section">
            <h3>2️⃣ 测试 Agent 服务 API (CORS)</h3>
            <button onclick="testAgentCORS()">测试CORS</button>
            <div id="agentCorsResult"></div>
        </div>

        <div class="test-section">
            <h3>3️⃣ 测试 Agent 对话功能</h3>
            <button onclick="testAgentChat()">发送测试消息</button>
            <div id="agentChatResult"></div>
        </div>

        <div class="test-section">
            <h3>4️⃣ 测试 API 后端连接</h3>
            <button onclick="testApiBackend()">测试连接</button>
            <div id="apiBackendResult"></div>
        </div>

        <div class="test-section">
            <h3>📊 网络诊断信息</h3>
            <button onclick="collectNetworkInfo()">收集信息</button>
            <div id="networkInfoResult"></div>
        </div>

        <div class="test-section">
            <h3>🎯 一键完整测试</h3>
            <button onclick="runAllTests()">运行所有测试</button>
            <div id="allTestsResult"></div>
        </div>
    </div>

    <script>
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="test-result ${type}">${message}</div>`;
        }

        function getAgentUrl() {
            return document.getElementById('agentUrl').value.replace(/\/$/, '');
        }

        function getApiUrl() {
            return document.getElementById('apiUrl').value.replace(/\/$/, '');
        }

        async function testAgentHealth() {
            showResult('agentHealthResult', '测试中...', 'info');
            const agentUrl = getAgentUrl();

            try {
                const response = await fetch(`${agentUrl}/health`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (response.ok) {
                    const data = await response.json();
                    showResult('agentHealthResult',
                        `✅ 连接成功！\n` +
                        `状态码: ${response.status}\n` +
                        `响应: ${JSON.stringify(data, null, 2)}`,
                        'success'
                    );
                } else {
                    showResult('agentHealthResult',
                        `❌ 连接失败！\n` +
                        `状态码: ${response.status}\n` +
                        `状态: ${response.statusText}`,
                        'error'
                    );
                }
            } catch (error) {
                showResult('agentHealthResult',
                    `❌ 连接错误！\n` +
                    `错误: ${error.message}\n` +
                    `可能原因:\n` +
                    `1. Agent服务未运行\n` +
                    `2. 网络连接失败\n` +
                    `3. 地址配置错误`,
                    'error'
                );
            }
        }

        async function testAgentCORS() {
            showResult('agentCorsResult', '测试中...', 'info');
            const agentUrl = getAgentUrl();

            try {
                const response = await fetch(`${agentUrl}/run`, {
                    method: 'OPTIONS',
                    mode: 'cors',
                    headers: {
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'Content-Type,Authorization'
                    }
                });

                const corsHeaders = {
                    'access-control-allow-origin': response.headers.get('access-control-allow-origin'),
                    'access-control-allow-methods': response.headers.get('access-control-allow-methods'),
                    'access-control-allow-headers': response.headers.get('access-control-allow-headers'),
                    'access-control-allow-credentials': response.headers.get('access-control-allow-credentials')
                };

                showResult('agentCorsResult',
                    `✅ CORS 预检请求成功！\n\n` +
                    `CORS 响应头:\n` +
                    `Allow-Origin: ${corsHeaders['access-control-allow-origin']}\n` +
                    `Allow-Methods: ${corsHeaders['access-control-allow-methods']}\n` +
                    `Allow-Headers: ${corsHeaders['access-control-allow-headers']}\n` +
                    `Allow-Credentials: ${corsHeaders['access-control-allow-credentials']}`,
                    'success'
                );
            } catch (error) {
                showResult('agentCorsResult',
                    `❌ CORS 测试失败！\n` +
                    `错误: ${error.message}\n` +
                    `可能原因:\n` +
                    `1. Agent服务未配置CORS\n` +
                    `2. 网络连接失败`,
                    'error'
                );
            }
        }

        async function testAgentChat() {
            showResult('agentChatResult', '发送消息中...', 'info');
            const agentUrl = getAgentUrl();

            try {
                const response = await fetch(`${agentUrl}/run`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer test'
                    },
                    body: JSON.stringify({
                        query: '你好',
                        session_id: 'test_session_' + Date.now()
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    showResult('agentChatResult',
                        `✅ 对话成功！\n\n` +
                        `响应:\n${JSON.stringify(data, null, 2)}`,
                        'success'
                    );
                } else {
                    const errorText = await response.text();
                    showResult('agentChatResult',
                        `❌ 对话失败！\n` +
                        `状态码: ${response.status}\n` +
                        `错误: ${errorText}`,
                        'error'
                    );
                }
            } catch (error) {
                showResult('agentChatResult',
                    `❌ 对话请求失败！\n` +
                    `错误: ${error.message}`,
                    'error'
                );
            }
        }

        async function testApiBackend() {
            showResult('apiBackendResult', '测试中...', 'info');
            const apiUrl = getApiUrl();

            try {
                const response = await fetch(`${apiUrl}/health`, {
                    method: 'GET',
                    mode: 'cors'
                });

                if (response.ok) {
                    const data = await response.json();
                    showResult('apiBackendResult',
                        `✅ 连接成功！\n` +
                        `状态码: ${response.status}\n` +
                        `响应: ${JSON.stringify(data, null, 2)}`,
                        'success'
                    );
                } else {
                    showResult('apiBackendResult',
                        `❌ 连接失败！\n` +
                        `状态码: ${response.status}`,
                        'error'
                    );
                }
            } catch (error) {
                showResult('apiBackendResult',
                    `❌ 连接错误！\n` +
                    `错误: ${error.message}`,
                    'error'
                );
            }
        }

        function collectNetworkInfo() {
            const info = {
                '当前页面URL': window.location.href,
                'Agent服务URL': getAgentUrl(),
                'API后端URL': getApiUrl(),
                '浏览器User-Agent': navigator.userAgent,
                '时间': new Date().toLocaleString()
            };

            showResult('networkInfoResult',
                `📋 网络信息:\n\n${JSON.stringify(info, null, 2)}`,
                'info'
            );
        }

        async function runAllTests() {
            showResult('allTestsResult', '开始运行所有测试...\n\n', 'info');

            const tests = [
                { name: 'Agent健康检查', fn: testAgentHealth },
                { name: 'Agent CORS测试', fn: testAgentCORS },
                { name: 'Agent对话测试', fn: testAgentChat },
                { name: 'API后端测试', fn: testApiBackend }
            ];

            let results = [];

            for (const test of tests) {
                try {
                    await new Promise(resolve => setTimeout(resolve, 500)); // 延迟500ms
                    await test.fn();
                    results.push(`${test.name}: ✅`);
                } catch (error) {
                    results.push(`${test.name}: ❌ (${error.message})`);
                }
            }

            showResult('allTestsResult',
                `🎯 完整测试结果:\n\n${results.join('\n')}`,
                results.every(r => r.includes('✅')) ? 'success' : 'warning'
            );
        }

        // 页面加载时自动收集网络信息
        window.onload = function() {
            collectNetworkInfo();
        };
    </script>
</body>
</html>
